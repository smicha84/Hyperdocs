async function run(){
  const elk=new ELK();
  try{
    const laid=await elk.layout(G);
    render(laid);
    document.getElementById('loading').style.display='none';
    zf();
  }catch(err){
    document.getElementById('loading').textContent='Layout error: '+err.message;
    console.error(err);
  }
}

function render(laid){
  const c=document.getElementById('canvas');
  const ns='http://www.w3.org/2000/svg';
  const svg=document.createElementNS(ns,'svg');
  const W=laid.width+40, H=laid.height+40;
  svg.setAttribute('width',W);
  svg.setAttribute('height',H);
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`);

  // Defs
  const defs=document.createElementNS(ns,'defs');
  function mkArrow(id,fill){
    const m=document.createElementNS(ns,'marker');
    m.setAttribute('id',id); m.setAttribute('viewBox','0 0 10 6');
    m.setAttribute('refX','10'); m.setAttribute('refY','3');
    m.setAttribute('markerWidth','7'); m.setAttribute('markerHeight','5');
    m.setAttribute('orient','auto');
    const p=document.createElementNS(ns,'path');
    p.setAttribute('d','M0,0 L10,3 L0,6 Z'); p.setAttribute('fill',fill);
    m.appendChild(p); defs.appendChild(m);
  }
  mkArrow('aw','#8b949e');
  mkArrow('ar','#fbbf24');
  mkArrow('ab','#6b7280');
  svg.appendChild(defs);

  const mg=document.createElementNS(ns,'g');
  mg.setAttribute('id','mg');

  // Collect positions
  const pos={};
  for(const n of laid.children){
    pos[n.id]={x:n.x,y:n.y,w:n.width,h:n.height};
  }

  // Draw phase/cluster background boxes
  drawGroups(mg,ns,pos);

  // Draw edges first (behind nodes)
  const edgeG=document.createElementNS(ns,'g');
  edgeG.setAttribute('id','edges');
  if(laid.edges){
    for(const e of laid.edges){
      const src=e.sources[0], tgt=e.targets[0];
      const key=src+'|'+tgt;
      const etype=ET[key]||'write';
      const g=document.createElementNS(ns,'g');
      g.setAttribute('class','edge');
      g.setAttribute('data-src',src);
      g.setAttribute('data-tgt',tgt);
      g.setAttribute('data-type',etype);

      let d;
      if(e.sections&&e.sections.length>0){
        const s=e.sections[0];
        d=`M${s.startPoint.x},${s.startPoint.y}`;
        if(s.bendPoints)for(const b of s.bendPoints)d+=` L${b.x},${b.y}`;
        d+=` L${s.endPoint.x},${s.endPoint.y}`;
      }else{
        const sp=pos[src], tp=pos[tgt];
        if(!sp||!tp)continue;
        d=`M${sp.x+sp.w},${sp.y+sp.h/2} L${tp.x},${tp.y+tp.h/2}`;
      }

      const p=document.createElementNS(ns,'path');
      p.setAttribute('d',d);
      p.setAttribute('fill','none');

      if(etype==='write'){
        const sph=(GR[src]||{}).phase||'';
        p.setAttribute('stroke',PC[sph]||'#8b949e');
        p.setAttribute('stroke-width','1.5');
        p.setAttribute('marker-end','url(#aw)');
      }else if(etype==='read'){
        p.setAttribute('stroke','#fbbf24');
        p.setAttribute('stroke-width','1');
        p.setAttribute('stroke-dasharray','5 3');
        p.setAttribute('marker-end','url(#ar)');
      }else if(etype==='bus_write'){
        const sph=(GR[src]||{}).phase||'';
        p.setAttribute('stroke',PC[sph]||'#8b949e');
        p.setAttribute('stroke-width','1.5');
        p.setAttribute('marker-end','url(#aw)');
      }else if(etype==='bus_read'){
        p.setAttribute('stroke','#6b7280');
        p.setAttribute('stroke-width','0.8');
        p.setAttribute('stroke-dasharray','3 3');
        p.setAttribute('opacity','0.4');
        p.setAttribute('marker-end','url(#ab)');
      }

      g.appendChild(p);
      edgeG.appendChild(g);
    }
  }
  mg.appendChild(edgeG);

  // Draw nodes
  const nodeG=document.createElementNS(ns,'g');
  nodeG.setAttribute('id','nodes');
  for(const n of laid.children){
    const info=NI[n.id]||{};
    const nt=info.nodeType||'script';
    const gr=GR[n.id]||{};
    const phase=gr.phase||'tools';
    const col=PC[phase]||'#6b7280';

    const g=document.createElementNS(ns,'g');
    g.setAttribute('data-id',n.id);
    g.setAttribute('data-phase',phase);
    g.setAttribute('data-type',nt);
    g.setAttribute('class','node');
    g.style.cursor='pointer';

    const rect=document.createElementNS(ns,'rect');
    rect.setAttribute('x',n.x);
    rect.setAttribute('y',n.y);
    rect.setAttribute('width',n.width);
    rect.setAttribute('height',n.height);

    if(nt==='script'){
      rect.setAttribute('rx','3');
      rect.setAttribute('fill',col+'18');
      rect.setAttribute('stroke',col);
      rect.setAttribute('stroke-width','2');
      if(info.optional)rect.setAttribute('stroke-dasharray','5 3');
    }else if(nt==='evidence_group'){
      rect.setAttribute('rx','4');
      rect.setAttribute('fill',(PC['3']||'#fbbf24')+'12');
      rect.setAttribute('stroke',PC['3']||'#fbbf24');
      rect.setAttribute('stroke-width','1.5');
      rect.setAttribute('stroke-dasharray','4 2');
    }else if(nt==='bus_data'){
      rect.setAttribute('rx','12');
      rect.setAttribute('fill','var(--surface,#161b22)');
      rect.setAttribute('stroke','#fbbf24');
      rect.setAttribute('stroke-width','1.5');
    }else{
      rect.setAttribute('rx','12');
      rect.setAttribute('fill','var(--surface2,#1c2333)');
      rect.setAttribute('stroke','var(--text-muted,#484f58)');
      rect.setAttribute('stroke-width','1');
    }

    g.appendChild(rect);

    const txt=document.createElementNS(ns,'text');
    txt.setAttribute('x',n.x+8);
    txt.setAttribute('y',n.y+n.height/2);
    txt.setAttribute('dominant-baseline','central');
    txt.setAttribute('font-family',"'SF Mono',Consolas,monospace");
    txt.setAttribute('pointer-events','none');

    const label=(n.labels&&n.labels[0])?n.labels[0].text:n.id;
    const maxCh=Math.floor((n.width-16)/7);
    txt.textContent=label.length>maxCh?label.slice(0,maxCh-2)+'..':label;

    if(nt==='bus_data'){
      txt.setAttribute('font-size','10'); txt.setAttribute('fill','#fbbf24');
    }else if(nt==='data'){
      txt.setAttribute('font-size','10'); txt.setAttribute('fill','var(--text-dim,#8b949e)');
    }else{
      txt.setAttribute('font-size','11'); txt.setAttribute('fill','var(--text,#e6edf3)');
    }

    g.appendChild(txt);

    g.addEventListener('mouseenter',()=>hl(n.id));
    g.addEventListener('mouseleave',()=>clr());
    g.addEventListener('click',(ev)=>{ev.stopPropagation();si(n.id);});

    nodeG.appendChild(g);
  }
  mg.appendChild(nodeG);

  svg.appendChild(mg);
  c.innerHTML='';
  c.appendChild(svg);
  svgEl=svg;
  at();
}

function drawGroups(mg,ns,pos){
  // Column-stripe approach: compute X range per phase, draw full-height stripes
  // with a header bar at the top. No overlapping bounding boxes.

  // Global Y bounds
  let globalY1=Infinity, globalY2=-Infinity;
  for(const p of Object.values(pos)){
    globalY1=Math.min(globalY1,p.y);
    globalY2=Math.max(globalY2,p.y+p.h);
  }

  // Compute X range per phase
  const phaseX={};
  for(const[nid,gr] of Object.entries(GR)){
    const p=pos[nid];
    if(!p)continue;
    const ph=gr.phase;
    if(!ph)continue;
    if(!phaseX[ph])phaseX[ph]={x1:p.x,x2:p.x+p.w};
    else{
      phaseX[ph].x1=Math.min(phaseX[ph].x1,p.x);
      phaseX[ph].x2=Math.max(phaseX[ph].x2,p.x+p.w);
    }
  }

  const headerH=28;
  const stripePad=10;
  const stripeTop=globalY1-headerH-stripePad;
  const stripeBot=globalY2+stripePad;
  const phaseOrder=['0','1','2','3','4a','4b','tools','bus'];

  for(const ph of phaseOrder){
    const xr=phaseX[ph];
    if(!xr)continue;
    const col=PC[ph]||'#6b7280';
    const g=document.createElementNS(ns,'g');
    g.setAttribute('class','phase-grp');
    g.setAttribute('data-phase',ph);

    const sx=xr.x1-stripePad;
    const sw=xr.x2-xr.x1+stripePad*2;

    // Full-height subtle vertical stripe
    const stripe=document.createElementNS(ns,'rect');
    stripe.setAttribute('x',sx);
    stripe.setAttribute('y',stripeTop);
    stripe.setAttribute('width',sw);
    stripe.setAttribute('height',stripeBot-stripeTop);
    stripe.setAttribute('fill',col+'08');
    stripe.setAttribute('stroke','none');
    g.appendChild(stripe);

    // Header bar at top of stripe
    const hdr=document.createElementNS(ns,'rect');
    hdr.setAttribute('x',sx);
    hdr.setAttribute('y',stripeTop);
    hdr.setAttribute('width',sw);
    hdr.setAttribute('height',headerH);
    hdr.setAttribute('fill',col+'25');
    hdr.setAttribute('stroke','none');
    g.appendChild(hdr);

    // Vertical separator line at right edge
    const sep=document.createElementNS(ns,'line');
    sep.setAttribute('x1',sx+sw);
    sep.setAttribute('y1',stripeTop);
    sep.setAttribute('x2',sx+sw);
    sep.setAttribute('y2',stripeBot);
    sep.setAttribute('stroke',col+'20');
    sep.setAttribute('stroke-width','1');
    g.appendChild(sep);

    // Phase label in header
    const lbl=document.createElementNS(ns,'text');
    lbl.setAttribute('x',sx+8);
    lbl.setAttribute('y',stripeTop+headerH/2);
    lbl.setAttribute('dominant-baseline','central');
    lbl.setAttribute('font-size','11');
    lbl.setAttribute('font-weight','700');
    lbl.setAttribute('font-family',"var(--font)");
    lbl.setAttribute('fill',col);
    lbl.setAttribute('letter-spacing','0.3');
    const labelText=ph==='bus'?'Session Data Bus':(PL[ph]||('Phase '+ph));
    // Truncate if wider than stripe
    lbl.textContent=labelText;
    g.appendChild(lbl);

    mg.appendChild(g);
  }

  // Cluster labels: small text above the first node in each cluster
  const clusterFirst={};
  for(const[nid,gr] of Object.entries(GR)){
    const p=pos[nid];
    if(!p)continue;
    const ph=gr.phase;
    const cl=gr.cluster;
    if(!ph||!cl)continue;
    const ck=ph+'|'+cl;
    if(!clusterFirst[ck]||p.y<clusterFirst[ck].y){
      clusterFirst[ck]={x:p.x,y:p.y,phase:ph,cluster:cl};
    }
  }

  for(const[ck,cf] of Object.entries(clusterFirst)){
    const col=PC[cf.phase]||'#6b7280';
    const lbl=document.createElementNS(ns,'text');
    lbl.setAttribute('x',cf.x);
    lbl.setAttribute('y',cf.y-6);
    lbl.setAttribute('font-size','8');
    lbl.setAttribute('font-weight','600');
    lbl.setAttribute('font-family',"var(--font)");
    lbl.setAttribute('fill',col+'60');
    lbl.setAttribute('letter-spacing','0.3');
    lbl.textContent=cf.cluster;
    mg.appendChild(lbl);
  }
}

// ── Highlight ───────────────────────────────────────────────
function hl(nid){
  const nodes=document.querySelectorAll('.node');
  const edges=document.querySelectorAll('.edge');
  const conn=new Set([nid]);
  edges.forEach(e=>{
    const s=e.getAttribute('data-src'),t=e.getAttribute('data-tgt');
    if(s===nid||t===nid){conn.add(s);conn.add(t);e.classList.add('hi-edge');e.classList.remove('dimmed');}
    else{e.classList.add('dimmed');e.classList.remove('hi-edge');}
  });
  nodes.forEach(n=>{
    const id=n.getAttribute('data-id');
    if(conn.has(id)){n.classList.add('hi');n.classList.remove('dimmed');}
    else{n.classList.add('dimmed');n.classList.remove('hi');}
  });
}
function clr(){
  document.querySelectorAll('.dimmed').forEach(e=>e.classList.remove('dimmed'));
  document.querySelectorAll('.hi').forEach(e=>e.classList.remove('hi'));
  document.querySelectorAll('.hi-edge').forEach(e=>e.classList.remove('hi-edge'));
}

// ── Info panel ──────────────────────────────────────────────
function si(nid){
  const p=document.getElementById('info'),c=document.getElementById('ic');
  const i=NI[nid];
  if(!i){c.innerHTML='<div class="m">No info for '+nid+'</div>';p.classList.add('vis');return;}
  let h='<h3>'+i.label+'</h3>';
  if(i.nodeType==='script'||i.nodeType==='evidence_group'){
    h+='<div class="m">Phase: '+i.phase+' &middot; '+i.cluster+'</div>';
    h+='<div class="m" style="font-family:var(--mono);font-size:10px;opacity:0.7">'+i.relPath+'</div>';
    if(i.doc){
      const docHtml=i.doc.replace(/\n/g,'<br>').replace(/</g,'&lt;');
      h+='<div style="margin:8px 0;padding:8px;background:var(--surface2);border-radius:4px;font-size:11px;line-height:1.5;color:var(--text);border-left:3px solid '+(PC[i.phase]||'#6b7280')+'">'+docHtml+'</div>';
    }
    if(i.children)h+='<div class="fl"><strong>Contains:</strong><br>'+i.children.map(c=>'<span>'+c.split('/').pop()+'</span>').join('')+'</div>';
    if(i.reads&&i.reads.length)h+='<div class="fl"><strong>Reads:</strong><br>'+i.reads.map(f=>'<span>'+f+'</span>').join('')+'</div>';
    if(i.writes&&i.writes.length)h+='<div class="fl"><strong>Writes:</strong><br>'+i.writes.map(f=>'<span>'+f+'</span>').join('')+'</div>';
  }else{
    h+='<div class="m">Phase: '+i.phase+(i.isBus?' &middot; Bus Member':'')+'</div>';
    h+='<div class="m">Writers: '+i.writerCount+' &middot; Readers: '+i.readerCount+'</div>';
    if(i.writers&&i.writers.length)h+='<div class="fl"><strong>Written by:</strong><br>'+i.writers.map(f=>'<span>'+f.split('/').pop()+'</span>').join('')+'</div>';
    if(i.readers&&i.readers.length)h+='<div class="fl"><strong>Read by:</strong><br>'+i.readers.map(f=>'<span>'+f.split('/').pop()+'</span>').join('')+'</div>';
  }
  c.innerHTML=h;p.classList.add('vis');
}
function ci(){document.getElementById('info').classList.remove('vis');}

// ── Toggle ──────────────────────────────────────────────────
function tog(what){
  show[what]=!show[what];
  const btnMap={tools:'bt',data:'bd',bus:'bb'};
  document.getElementById(btnMap[what]).classList.toggle('active',show[what]);

  if(what==='tools'){
    document.querySelectorAll('.node[data-phase="tools"]').forEach(n=>n.style.display=show.tools?'':'none');
    document.querySelectorAll('.phase-grp[data-phase="tools"]').forEach(n=>n.style.display=show.tools?'':'none');
  }
  if(what==='data'){
    document.querySelectorAll('.node[data-type="data"]').forEach(n=>n.style.display=show.data?'':'none');
  }
  if(what==='bus'){
    document.querySelectorAll('.node[data-type="bus_data"]').forEach(n=>n.style.display=show.bus?'':'none');
    document.querySelectorAll('.phase-grp[data-phase="bus"]').forEach(n=>n.style.display=show.bus?'':'none');
  }
  // Update edge visibility
  document.querySelectorAll('.edge').forEach(e=>{
    const t=e.getAttribute('data-type');
    const s=e.getAttribute('data-src'),tg=e.getAttribute('data-tgt');
    let vis=true;
    if(!show.bus&&(t==='bus_write'||t==='bus_read'))vis=false;
    if(!show.data&&(t==='write'||t==='read'))vis=false;
    if(!show.tools){
      const sn=document.querySelector('.node[data-id="'+s+'"]');
      const tn=document.querySelector('.node[data-id="'+tg+'"]');
      if((sn&&sn.getAttribute('data-phase')==='tools')||(tn&&tn.getAttribute('data-phase')==='tools'))vis=false;
    }
    e.style.display=vis?'':'none';
  });
}

// ── Pan & Zoom ──────────────────────────────────────────────
function at(){
  if(!svgEl)return;
  svgEl.style.transform=`translate(${tx}px,${ty}px) scale(${sc})`;
  svgEl.style.transformOrigin='0 0';
}
function zi(){sc=Math.min(sc*1.3,5);at();}
function zo(){sc=Math.max(sc/1.3,0.05);at();}
function zf(){
  if(!svgEl)return;
  const cv=document.getElementById('canvas');
  const cw=cv.clientWidth,ch=cv.clientHeight;
  const sw=parseFloat(svgEl.getAttribute('width'))||cw;
  const sh=parseFloat(svgEl.getAttribute('height'))||ch;
  sc=Math.min(cw/sw,ch/sh)*0.92;
  tx=(cw-sw*sc)/2; ty=(ch-sh*sc)/2;
  at();
}

const cv=document.getElementById('canvas');
cv.addEventListener('mousedown',e=>{
  if(e.target.closest('.node'))return;
  pan=true; px=e.clientX-tx; py=e.clientY-ty; cv.classList.add('panning');
});
window.addEventListener('mousemove',e=>{
  if(!pan)return; tx=e.clientX-px; ty=e.clientY-py; at();
});
window.addEventListener('mouseup',()=>{pan=false;cv.classList.remove('panning');});
cv.addEventListener('wheel',e=>{
  e.preventDefault();
  const f=e.deltaY<0?1.1:0.9;
  const r=cv.getBoundingClientRect();
  const mx=e.clientX-r.left, my=e.clientY-r.top;
  const ns=Math.min(Math.max(sc*f,0.05),5);
  tx=mx-(mx-tx)*(ns/sc); ty=my-(my-ty)*(ns/sc); sc=ns; at();
},{passive:false});
cv.addEventListener('click',e=>{if(!e.target.closest('.node'))ci();});

document.addEventListener('keydown',e=>{
  if(e.key==='Escape')ci();
  if(e.key==='t')tog('tools');
  if(e.key==='d')tog('data');
  if(e.key==='b')tog('bus');
  if(e.key==='+'||e.key==='=')zi();
  if(e.key==='-')zo();
  if(e.key==='0')zf();
});

// ── Animation Functions ─────────────────────────────────────
function animPlay(){
  if(anim.step>=CP.length-1)animReset();
  anim.playing=true;
  document.getElementById('bp').style.display='none';
  document.getElementById('bpa').style.display='';
  document.getElementById('step-indicator').classList.add('vis');
  if(anim.step<0)animAdvance();
  anim.timer=setInterval(()=>{
    if(anim.step>=CP.length-1){animPause();return;}
    animAdvance();
  },ANIM_DELAY);
}

function animPause(){
  anim.playing=false;
  if(anim.timer){clearInterval(anim.timer);anim.timer=null;}
  document.getElementById('bp').style.display='';
  document.getElementById('bp').textContent=anim.step>=CP.length-1?'\u25B6 Replay':'\u25B6 Play';
  document.getElementById('bpa').style.display='none';
}

function animStep(){
  if(anim.playing)animPause();
  if(anim.step>=CP.length-1)animReset();
  document.getElementById('step-indicator').classList.add('vis');
  animAdvance();
}

function animReset(){
  anim.playing=false;
  if(anim.timer){clearInterval(anim.timer);anim.timer=null;}
  anim.step=-1;
  anim.trail.clear();
  // Clear all animation classes
  document.querySelectorAll('.anim-active,.anim-trail,.anim-trail-spot,.anim-edge,.anim-edge-trail,.dimmed,.hi,.hi-edge').forEach(el=>{
    el.classList.remove('anim-active','anim-trail','anim-trail-spot','anim-edge','anim-edge-trail','dimmed','hi','hi-edge');
  });
  document.getElementById('step-indicator').classList.remove('vis');
  document.getElementById('bp').style.display='';
  document.getElementById('bp').textContent='\u25B6 Play';
  document.getElementById('bpa').style.display='none';
}

function animMode(){
  anim.mode=anim.mode==='trail'?'spot':'trail';
  document.getElementById('bm').textContent=anim.mode==='trail'?'Trail':'Spot';
  // Re-render current state if mid-animation
  if(anim.step>=0)animRender();
}

function animAdvance(){
  anim.step++;
  if(anim.step>=CP.length){animPause();return;}
  const s=CP[anim.step];

  // Add current step nodes to trail
  anim.trail.add(s.script);
  for(const w of s.writes)anim.trail.add(w);
  for(const r of s.reads)anim.trail.add(r);

  animRender();
  animPanTo(s.script);
  animUpdateIndicator();
}

function animRender(){
  const s=CP[anim.step];
  const currentSet=new Set([s.script,...s.writes]);
  const nodes=document.querySelectorAll('.node');
  const edges=document.querySelectorAll('.edge');

  // Classify nodes
  nodes.forEach(n=>{
    const id=n.getAttribute('data-id');
    n.classList.remove('anim-active','anim-trail','anim-trail-spot','dimmed','hi','hi-edge');
    if(currentSet.has(id)){
      n.classList.add('anim-active');
    }else if(anim.trail.has(id)){
      n.classList.add(anim.mode==='trail'?'anim-trail':'anim-trail-spot');
    }else{
      n.classList.add('dimmed');
    }
  });

  // Classify edges: active if both endpoints in trail
  edges.forEach(e=>{
    const src=e.getAttribute('data-src'), tgt=e.getAttribute('data-tgt');
    e.classList.remove('anim-edge','anim-edge-trail','dimmed','hi-edge');
    const srcInCurrent=currentSet.has(src), tgtInCurrent=currentSet.has(tgt);
    const srcInTrail=anim.trail.has(src), tgtInTrail=anim.trail.has(tgt);
    if((srcInCurrent||tgtInCurrent)&&srcInTrail&&tgtInTrail){
      e.classList.add('anim-edge');
    }else if(srcInTrail&&tgtInTrail&&anim.mode==='trail'){
      e.classList.add('anim-edge-trail');
    }else{
      e.classList.add('dimmed');
    }
  });
}

function animPanTo(nodeId){
  const el=document.querySelector('[data-id="'+nodeId+'"]');
  if(!el)return;
  const rect=el.querySelector('rect');
  if(!rect)return;
  const nx=parseFloat(rect.getAttribute('x'));
  const ny=parseFloat(rect.getAttribute('y'));
  const nw=parseFloat(rect.getAttribute('width'));
  const nh=parseFloat(rect.getAttribute('height'));
  const cv=document.getElementById('canvas');
  const cw=cv.clientWidth, ch=cv.clientHeight;
  // Center the node in view
  const targetX=cw/2-(nx+nw/2)*sc;
  const targetY=ch/2-(ny+nh/2)*sc;
  // Smooth pan
  const startX=tx, startY=ty;
  const dx=targetX-startX, dy=targetY-startY;
  let t0=null;
  function step(ts){
    if(!t0)t0=ts;
    const p=Math.min((ts-t0)/400,1);
    const ease=p<0.5?2*p*p:(1-Math.pow(-2*p+2,2)/2);
    tx=startX+dx*ease;
    ty=startY+dy*ease;
    at();
    if(p<1)requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function animUpdateIndicator(){
  const s=CP[anim.step];
  const total=CP.length;
  document.getElementById('si-label').textContent='Step '+(anim.step+1)+'/'+total+': '+s.label;
  const nw=s.writes.length;
  document.getElementById('si-desc').textContent=nw>0?(nw+' file'+(nw>1?'s':'')+' produced'):'Final output';
  // Dots
  const dots=document.getElementById('si-dots');
  dots.innerHTML='';
  for(let i=0;i<total;i++){
    const d=document.createElement('span');
    d.className='dot'+(i<anim.step?' done':'')+(i===anim.step?' cur':'');
    dots.appendChild(d);
  }
}

run();
</script>
