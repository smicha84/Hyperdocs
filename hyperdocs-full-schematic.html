<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hyperdocs Full Pipeline Schematic</title>
<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --surface2: #1c2333;
  --border: rgba(255,255,255,0.08);
  --border-hi: rgba(255,255,255,0.2);
  --text: #e6edf3;
  --text-dim: #8b949e;
  --text-muted: #484f58;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --mono: 'SF Mono', 'Fira Code', Consolas, monospace;
}
/* Dark mode only — designed for dark backgrounds */
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:var(--font); overflow:hidden; height:100vh; }
header {
  background:var(--surface); border-bottom:1px solid var(--border);
  padding:8px 16px; display:flex; justify-content:space-between; align-items:center;
  z-index:100; position:relative;
}
header h1 { font-size:15px; font-weight:600; }
header .stats { font-size:11px; color:var(--text-dim); margin-top:2px; }
.controls { display:flex; align-items:center; gap:6px; }
.controls button {
  padding:4px 10px; border:1px solid var(--border); background:var(--surface2);
  color:var(--text-dim); font-size:11px; font-family:var(--mono); border-radius:4px;
  cursor:pointer; transition:all 0.15s;
}
.controls button:hover { border-color:var(--border-hi); color:var(--text); }
.controls button.active { background:#1a6bff22; border-color:#1a6bff88; color:#58a6ff; }
.zbtn { width:28px; padding:4px !important; text-align:center; }
#canvas {
  width:100%; height:calc(100vh - 52px); overflow:hidden; position:relative; cursor:grab;
}
#canvas.panning { cursor:grabbing; }
#canvas svg { position:absolute; top:0; left:0; }
/* Dimming */
.dimmed { opacity:0.06 !important; }
.hi { opacity:1 !important; }
.hi-edge { opacity:1 !important; stroke-width:2.5 !important; }
/* Info panel */
#info {
  position:fixed; right:12px; top:64px; width:320px; background:var(--surface);
  border:1px solid var(--border-hi); border-radius:8px; padding:12px; font-size:12px;
  z-index:200; display:none; box-shadow:0 4px 16px rgba(0,0,0,.3);
  max-height:calc(100vh - 80px); overflow-y:auto;
}
#info.vis { display:block; }
#info h3 { font-size:13px; margin-bottom:6px; font-family:var(--mono); }
#info .m { color:var(--text-dim); margin-bottom:3px; font-size:11px; }
#info .fl { margin-top:6px; }
#info .fl span {
  display:inline-block; background:var(--surface2); border:1px solid var(--border);
  border-radius:3px; padding:1px 5px; margin:2px; font-family:var(--mono); font-size:10px;
}
#info .x { position:absolute; top:8px; right:8px; background:none; border:none;
  color:var(--text-dim); cursor:pointer; font-size:14px; }
/* Legend */
#legend {
  position:fixed; left:12px; bottom:12px; background:var(--surface);
  border:1px solid var(--border); border-radius:8px; padding:8px 12px;
  font-size:10px; z-index:200; display:flex; gap:14px; opacity:0.9;
}
.li { display:flex; align-items:center; gap:4px; color:var(--text-dim); }
.sw { width:14px; height:9px; border-radius:2px; border:1px solid; display:inline-block; }
.ln { width:18px; height:0; display:inline-block; }
#loading {
  position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
  font-size:14px; color:var(--text-dim); z-index:300;
}
/* Animation */
@keyframes pulse {
  0%,100% { filter:brightness(1) drop-shadow(0 0 0px transparent); }
  50% { filter:brightness(1.4) drop-shadow(0 0 8px currentColor); }
}
@keyframes march {
  to { stroke-dashoffset: -20; }
}
.anim-active { opacity:1 !important; animation: pulse 1s ease-in-out infinite; }
.anim-trail { opacity:0.85 !important; }
.anim-trail-spot { opacity:0.15 !important; }
.anim-edge path { animation: march 0.6s linear infinite !important; stroke-dasharray: 8 4 !important; stroke-width:2.5 !important; opacity:1 !important; }
.anim-edge-trail { opacity:0.5 !important; }
.anim-edge-trail path { stroke-width:2 !important; }
#step-indicator {
  position:fixed; bottom:48px; left:50%; transform:translateX(-50%);
  background:var(--surface); border:1px solid var(--border-hi); border-radius:8px;
  padding:8px 16px; font-size:12px; font-family:var(--mono); z-index:200;
  display:none; box-shadow:0 4px 12px rgba(0,0,0,.3); text-align:center;
  min-width:280px;
}
#step-indicator.vis { display:block; }
#step-indicator .step-label { color:var(--text); font-weight:600; }
#step-indicator .step-desc { color:var(--text-dim); font-size:11px; margin-top:2px; }
#step-indicator .step-dots { margin-top:4px; display:flex; gap:4px; justify-content:center; }
#step-indicator .dot { width:8px; height:8px; border-radius:50%; background:var(--text-muted); }
#step-indicator .dot.done { background:var(--text-dim); }
#step-indicator .dot.cur { background:#58a6ff; box-shadow:0 0 6px #58a6ff; }
.anim-btn { border-left:1px solid var(--border); padding-left:8px !important; margin-left:2px; }
</style>
</head>

const NI={"phase_0_prep_batch_p0_llm_py": {"label": "batch_p0_llm.py", "relPath": "phase_0_prep/batch_p0_llm.py", "phase": "0", "cluster": "LLM Passes", "reads": ["batch_llm_status.json", "duplicate_manifest.json", "enriched_session.json", "enriched_session_v2.json", "llm_pass1_content_ref.json", "llm_pass2_behaviors.json", "llm_pass3_intent.json", "llm_pass4_importance.json"], "writes": ["batch_llm_status.json"], "nodeType": "script", "doc": "Phase 0.5 LLM Batch Orchestrator\n====================================\n\nRuns all 4 LLM passes across all unique sessions with concurrent processing.\n\nPass order:\n  Pass 1 (Haiku, 50 concurrent):  Content-referential + assumption subtypes\n  Pass 2 (Opus, 30 concurrent):   Silent decisions + unverified claims + overconfidence\n  Pass 3 (Opus, 30 concurrent):   Intent assumption resolution (targeted, needs Pass 1)\n  Pass 4 (Haiku, 50 concurrent):  Strategic importance scoring\n\nAfter all passes: merge results into enriched_session_v2.json\n\nUsage:\n    python3 batch_p0_llm.py                       # run all passes\n    python3 batch_p0_llm.py --pass 1              # run only Pass 1\n    python3 batch_p0_llm.py --dry-run             # estimate costs only\n    python3 batch_p0_llm.py --session session_X   # one session only\n    python3 batch_p0_llm.py --merge-only          # only merge step\n    python3 batch_p0_llm.py --status              # show current progress\n\nCost estimate (~$77 total):\n  Pass 1 (Haiku):  162 sessions, ~$8\n  Pass 2 (Opus):   162 sessions, ~$52\n  Pass 3 (Opus):   ~20-30 flagged sessions, ~$10\n  Pass 4 (Haiku):  162 sessions, ~$7"}, "phase_0_prep_batch_phase0_reprocess_py": {"label": "batch_phase0_reprocess.py", "relPath": "phase_0_prep/batch_phase0_reprocess.py", "phase": "0", "cluster": "Batch", "reads": ["enriched_session.json"], "writes": ["phase0_reprocess_log.json"], "nodeType": "script", "doc": "Batch Phase 0 Reprocessor \u2014 Re-runs enrich_session.py + prepare_agent_data.py\non ALL sessions with the 9 data quality fixes applied.\n\n$0 cost. Pure Python. Updates enriched_session.json and all derivative files\n(safe_*, tier*, conversation_condensed, emergency_contexts, batches).\n\nThen re-runs schema_normalizer and completeness_scanner for a fresh quality report.\n\nUsage:\n    python3 batch_phase0_reprocess.py"}, "phase_0_prep_build_opus_messages_py": {"label": "build_opus_messages.py", "relPath": "phase_0_prep/build_opus_messages.py", "phase": "0", "cluster": "Opus Path", "reads": ["enriched_session.json", "enriched_session_v2.json", "opus_classifications.json"], "writes": ["opus_priority_messages.json"], "nodeType": "script", "doc": "Build Opus-Filtered Message Files\n\nTakes opus_classifications.json + enriched_session.json and produces\nmessage files filtered by Opus importance instead of Python tiers.\n\nThis replaces tier4_priority_messages.json with opus_priority_messages.json\nfor Phase 1 agents. Messages classified as critical, significant, or context\nby Opus are included, regardless of Python tier.\n\nUsage:\n    python3 build_opus_messages.py --session 0012ebed\n    python3 build_opus_messages.py --dir ~/PERMANENT_HYPERDOCS/sessions/session_0012ebed"}, "phase_0_prep_claude_behavior_analyzer_py": {"label": "claude_behavior_analyzer.py", "relPath": "phase_0_prep/claude_behavior_analyzer.py", "phase": "0", "cluster": "Libraries", "reads": [], "writes": [], "nodeType": "script", "doc": "Claude Behavior Analyzer\n========================\n\nAnalyzes Claude's responses and thinking to detect behavioral patterns\nidentified by the Idea Evolution Analysis (1,668 ideas across 216 sessions).\n\nDetects 20 behaviors in 4 categories:\n\nCONTEXT DAMAGE (original 7):\n  1. confusion          \u2014 \"I'm not sure\", \"let me re-read\"\n  2. forgetting         \u2014 \"I forgot\", \"I missed\"\n  3. assumptions        \u2014 \"I'll assume\", \"probably means\"\n  4. contradicts_self   \u2014 Says something that conflicts with a prior statement (H)\n  5. apologizes         \u2014 \"I apologize\", \"sorry\"\n  6. rushing            \u2014 Short thinking, jumps to action\n  7. overconfident      \u2014 \"definitely\", \"will work\", \"should fix\"\n\nIDEA EVOLUTION PATTERNS (new, from analysis):\n  8. unsolicited_addition   \u2014 Adds features/defaults/fallbacks not requested (A)\n  9. premature_completion   \u2014 \"done\", \"complete\", \"finished\" without evidence (B)\n  10. batch_without_verify  \u2014 Creates/modifies multiple files without testing (C)\n  11. silent_decision       \u2014 Sets values/defaults without presenting options (D)\n  12. hollow_fulfillment    \u2014 Output structurally matches request but content is generic (E)\n  13. unverified_claim      \u2014 States facts without showing evidence (F)\n  14. scope_creep           \u2014 Expands beyond what was asked (G)\n  15. repeats_failed        \u2014 Tries same approach that already failed (I)\n\nRECOVERY BEHAVIORS (positive):\n  16. tries_to_clarify      \u2014 \"To clarify\", \"let me understand\"\n  17. asks_questions        \u2014 Actually asks user for clarification\n  18. acknowledges_mistake  \u2014 \"I made a mistake\", \"that was wrong\"\n\nMETA:\n  19. ignores_context       \u2014 Doesn't reference recent messages\n  20. user_upset_score     \u2014 How upsetting this message is (scored by user, no cap)\n\nEvidence: Idea Evolution Analysis found 14.6% verification rate, 5.7:1 confidence-\nevidence mismatch, 30:1 evolution-to-abandonment ratio, \"Helpful Saboteur\" pattern\nacross 8 sessions, and the \"You Lied\" pivot where 4 templates were presented as 33\ncustom visualizations."}, "phase_0_prep_claude_session_reader_py": {"label": "claude_session_reader.py", "relPath": "phase_0_prep/claude_session_reader.py", "phase": "0", "cluster": "Libraries", "reads": ["projects/*/*.jsonl"], "writes": [], "nodeType": "script", "doc": "Claude Session Reader\n=====================\n\nReads Claude Code session files from ~/.claude/projects/ to extract:\n- Claude's responses with token usage (input_tokens, output_tokens)\n- Claude's thinking content (verbose thinking)\n- Full conversation context (user + assistant messages)\n\nThis complements the PERMANENT_ARCHIVE (user input only) with:\n- Claude's token consumption per message\n- Claude's internal reasoning/thinking\n\nUsage:\n    from claude_session_reader import ClaudeSessionReader\n\n    reader = ClaudeSessionReader()\n    sessions = reader.load_project_sessions(limit=5)"}, "phase_0_prep_code_similarity_py": {"label": "code_similarity.py", "relPath": "phase_0_prep/code_similarity.py", "phase": "0", "cluster": "Libraries", "reads": [], "writes": ["code_similarity_index.json"], "nodeType": "script", "doc": "Code Similarity Engine \u2014 Full Scan Mode\n========================================\n\nCompares ALL Python files against ALL others. No pre-filtering.\nNo genealogy input. Completely unobstructed.\n\nSignals computed per file:\n  1. Function names (AST)\n  2. Class names and method signatures (AST)\n  3. Import fingerprint (what modules are imported)\n  4. Constants and string literals\n  5. Filename stem words\n\nPair comparison:\n  - Function overlap ratio\n  - Import overlap ratio\n  - Text similarity (difflib, only for pairs with initial signal)\n  - Containment check (is file B a subset of file A?)\n\nPattern classification:\n  - dead_copy:         >90% text similarity\n  - evolution_pair:    60-90% text similarity\n  - function_clone:    >50% shared function names\n  - partial_extraction: B's functions are a subset of A's (>80% containment)\n  - template_variant:  same structure, <30% text similarity (parameterized)\n  - import_twin:       >70% shared imports, <30% function overlap\n  - name_only:         filename stems overlap but code doesn't (<5% any signal)\n  - interface_mismatch: files call each other's names but signatures diverge\n\nInput:  Directory of Python files\nOutput: code_similarity_index.json\n\nUsage:\n    python3 code_similarity.py [--source-dir PATH] [--output PATH] [--threshold 0.1]"}, "phase_0_prep_enrich_session_py": {"label": "enrich_session.py", "relPath": "phase_0_prep/enrich_session.py", "phase": "0", "cluster": "Core", "reads": [], "writes": ["enriched_session.json"], "nodeType": "script", "doc": "Phase 0: Deterministic Prep\n============================\n\nRuns ALL free Python extractors on a reference session, producing one\nenriched_session.json that all extraction agents will read.\n\nZero LLM cost. Pure Python metadata extraction, filtering, behavior analysis.\n\nReuses existing V5 modules:\n  - ClaudeSessionReader  \u2192 parse JSONL into structured messages\n  - MetadataExtractor    \u2192 50+ signals per message (files, errors, frustration)\n  - MessageFilter        \u2192 4-tier classification (skip/basic/standard/priority)\n  - ClaudeBehaviorAnalyzer \u2192 context damage flags on assistant messages\n\nUsage:\n    python3 enrich_session.py"}, "phase_0_prep_geological_reader_py": {"label": "geological_reader.py", "relPath": "phase_0_prep/geological_reader.py", "phase": "0", "cluster": "Libraries", "reads": [], "writes": [], "nodeType": "script", "doc": "Geological Reader - OPUS EDITION\n\nWHAT CHANGED:\n- Message parsing: Was JSON field extraction \u2192 Now Opus understands message structure\n- Timestamp extraction: Was datetime parsing \u2192 Now Opus interprets various formats\n- Content extraction: Was nested dict traversal \u2192 Now Opus extracts meaningful content\n- Statistics: Was manual counting \u2192 Now Opus provides semantic analysis\n\nOPUS READS AND UNDERSTANDS. Python handles file I/O."}, "phase_0_prep_llm_pass_runner_py": {"label": "llm_pass_runner.py", "relPath": "phase_0_prep/llm_pass_runner.py", "phase": "0", "cluster": "LLM Passes", "reads": ["enriched_session.json", "llm_pass1_content_ref.json", "safe_condensed.json"], "writes": ["llm_pass1_content_ref.json", "llm_pass2_behaviors.json", "llm_pass3_intent.json", "llm_pass4_importance.json"], "nodeType": "script", "doc": "Phase 0 LLM Pass Runner\n========================\n\nCore infrastructure for running LLM passes on enriched session data.\nLoads enriched_session.json, filters messages per pass, batches into\nprompts within context window limits, calls specified model, parses\nJSON responses, retries on errors, and writes per-pass output JSON.\n\nUsage:\n    # Run a single pass on a single session\n    python3 llm_pass_runner.py --pass 1 --session session_0012ebed\n\n    # Run all passes on a single session\n    python3 llm_pass_runner.py --pass all --session session_0012ebed\n\n    # Dry run (show what would be processed, no API calls)\n    python3 llm_pass_runner.py --pass 1 --session session_0012ebed --dry-run"}, "phase_0_prep_merge_llm_results_py": {"label": "merge_llm_results.py", "relPath": "phase_0_prep/merge_llm_results.py", "phase": "0", "cluster": "LLM Passes", "reads": ["enriched_session.json", "llm_pass1_content_ref.json", "llm_pass2_behaviors.json", "llm_pass3_intent.json", "llm_pass4_importance.json"], "writes": ["enriched_session_v2.json"], "nodeType": "script", "doc": "Phase 0 LLM Results Merger\n============================\n\nMerges per-pass LLM output files into enriched_session.json, producing\nenriched_session_v2.json with the combined Python + LLM analysis.\n\nEach message gets an `llm_behavior` key with structured results from\nall 4 passes. Messages not analyzed by any pass get `llm_behavior: null`.\n\nUsage:\n    python3 merge_llm_results.py --session session_0012ebed"}, "phase_0_prep_message_filter_py": {"label": "message_filter.py", "relPath": "phase_0_prep/message_filter.py", "phase": "0", "cluster": "Libraries", "reads": [], "writes": [], "nodeType": "script", "doc": "Message Filter for Hyperdocs Pipeline\n=====================================\n\nFilters messages BEFORE sending to Opus to reduce API costs.\nUses cheap Python heuristics to identify high-value messages.\n\nFILTERING TIERS:\n  Tier 1 (SKIP):     <50 chars, no keywords, no pasted content \u2192 SKIP\n  Tier 2 (BASIC):    50-100 chars with keywords \u2192 Basic extraction only\n  Tier 3 (STANDARD): 100-500 chars OR has pasted content \u2192 Full 6-thread\n  Tier 4 (PRIORITY): 500+ chars OR multiple struggle signals \u2192 Deep analysis\n\nThis reduces Opus calls by ~40-60% while preserving important context."}, "phase_0_prep_metadata_extractor_py": {"label": "metadata_extractor.py", "relPath": "phase_0_prep/metadata_extractor.py", "phase": "0", "cluster": "Libraries", "reads": [], "writes": [], "nodeType": "script", "doc": "Metadata Extractor\n==================\n\nPure Python extraction of structured metadata from chat history.\nNO LLM CALLS. This is deterministic, free, fast.\n\nExtracts:\n- Timestamps, dates, time of day patterns\n- File names and paths mentioned\n- Error patterns (tracebacks, exceptions, error messages)\n- Message counts (per hour, per day)\n- Role ratios (user vs assistant)\n- Tool calls and their types\n- Screenshots/images\n- Browser open commands\n- Server activity (port mentions, localhost, etc.)\n- Code blocks and languages\n\nThis metadata feeds into Haiku with pre-enriched context."}, "phase_0_prep_opus_classifier_py": {"label": "opus_classifier.py", "relPath": "phase_0_prep/opus_classifier.py", "phase": "0", "cluster": "Opus Path", "reads": ["enriched_session.json", "enriched_session_v2.json"], "writes": ["opus_classifications.json", "opus_vs_python_comparison.json"], "nodeType": "script", "doc": "Opus Message Classifier \u2014 Replaces Python tier 1-4 heuristics\n\nInstead of Python guessing importance via keyword matching and character counts,\nOpus reads each message in context and determines:\n1. Whether this message matters for understanding the session\n2. WHY it matters (what category of importance)\n3. What it connects to (which files, which ideas, which decisions)\n\nThe Python tier system is in standby (message_filter.py). When enough Opus\nclassifications accumulate across sessions, the patterns will be codified\nback into Python rules \u2014 but the rules will be LEARNED from Opus, not\nhand-crafted from assumptions.\n\nDesign: Based on FAIR-RAG gap-driven refinement and the \"steak 10 seconds\nat a time\" principle. Classify in batches. Check quality. Stop when done.\n\nUsage:\n    # Classify a sample of messages from a session\n    python3 opus_classifier.py --session 0012ebed --sample 30\n\n    # Classify all messages (expensive)\n    python3 opus_classifier.py --session 0012ebed --all\n\n    # Compare Opus classifications to Python tier system\n    python3 opus_classifier.py --session 0012ebed --compare"}, "phase_0_prep_prepare_agent_data_py": {"label": "prepare_agent_data.py", "relPath": "phase_0_prep/prepare_agent_data.py", "phase": "0", "cluster": "Core", "reads": ["enriched_session.json", "enriched_session_v2.json", "opus_classifications.json"], "writes": ["batches/batch_NNN.json", "conversation_condensed.json", "emergency_contexts.json", "opus_priority_messages.json", "safe_condensed.json", "safe_tier4.json", "session_metadata.json", "tier2plus_messages.json", "tier4_priority_messages.json", "user_messages_tier2plus.json"], "nodeType": "script", "doc": "Prepare agent-friendly data files from enriched_session.json.\n\nSplits the 8.5 MB enriched session into smaller, focused files that\nextraction agents can read directly via the Read tool."}, "phase_0_prep_prompts_py": {"label": "prompts.py", "relPath": "phase_0_prep/prompts.py", "phase": "0", "cluster": "LLM Passes", "reads": [], "writes": [], "nodeType": "script", "doc": "Phase 0 LLM Pass Prompts\n=========================\n\nSeven prompt templates for the 4 LLM passes that supplement Python-only Phase 0.\nEach prompt was tested across 450+ API calls (3 models x 3 rounds of refinement)\non 50-message samples from session 0012ebed.\n\nRound 3 (example-based) achieved:\n  - content_referential: 90%+ agreement (all models)\n  - unverified_claims: 90% agreement\n  - overconfidence: 92% agreement\n  - assumptions subtypes: 80% ceiling (best achievable)\n  - silent_decisions: 80% with Opus (50% cross-model)\n\nPass 1 (Haiku 4.5): content_referential + assumption subtypes\nPass 2 (Opus 4.6): silent_decisions + unverified_claims + overconfidence\nPass 3 (Opus 4.6): intent_assumption resolution (targeted, needs user context)\nPass 4 (Haiku 4.5): strategic importance scoring"}, "phase_1_extraction_batch_p1_llm_py": {"label": "batch_p1_llm.py", "relPath": "phase_1_extraction/batch_p1_llm.py", "phase": "1", "cluster": "Batch", "reads": ["enriched_session.json", "enriched_session_v2.json", "llm_pass1_content_ref.json", "llm_pass2_behaviors.json", "llm_pass3_intent.json", "llm_pass4_importance.json", "llm_pass_checkpoint.json", "llm_pass_cost_log.json"], "writes": ["llm_pass_checkpoint.json", "llm_pass_cost_log.json"], "nodeType": "script", "doc": "Batch LLM Orchestrator \u2014 Runs Phase 0 LLM passes across all sessions.\n\nExecutes the 4 LLM passes (content-ref, behaviors, intent, importance)\nacross all sessions with enriched_session.json. Manages concurrency,\ncheckpointing, cost tracking, and pass ordering.\n\nPass order: 1\u21922\u21923\u21924 (Pass 3 depends on Pass 1 results)\nConcurrency: Passes 1,4 (Haiku) up to 50-60 concurrent. Passes 2,3 (Opus) up to 30.\n\nUsage:\n    # Dry run \u2014 estimate costs across all sessions\n    python3 batch_p1_llm.py --dry-run\n\n    # Validate on 5 test sessions first\n    python3 batch_p1_llm.py --validate\n\n    # Run specific pass across all sessions\n    python3 batch_p1_llm.py --pass 1\n\n    # Run all passes across all sessions\n    python3 batch_p1_llm.py --all\n\n    # Resume from checkpoint (skips already-complete sessions)\n    python3 batch_p1_llm.py --all --resume\n\n    # Show status\n    python3 batch_p1_llm.py --status"}, "phase_1_extraction_extract_threads_py": {"label": "extract_threads.py", "relPath": "phase_1_extraction/extract_threads.py", "phase": "1", "cluster": "Fallback", "reads": ["opus_priority_messages.json", "tier4_priority_messages.json"], "writes": ["thread_extractions.json"], "nodeType": "script", "doc": "Thread Analyst: Extract 6 threads + 6 markers from tier4 messages.\nForensic analysis - honest assessment of Claude behavior including harmful patterns.\n\nNOTE: This file contains hand-annotated data for the reference session (3b7084d5).\nThe USER_IDEA_ANNOTATIONS and NARRATIVE_ANNOTATIONS dicts only activate when\nprocessing that specific session. For all other sessions, extraction is purely\npattern-based."}, "phase_1_extraction_interactive_batch_runner_py": {"label": "interactive_batch_runner.py", "relPath": "phase_1_extraction/interactive_batch_runner.py", "phase": "1", "cluster": "Batch", "reads": ["enriched_session.json", "explorer_notes.json", "geological_notes.json", "grounded_markers.json", "idea_graph.json", "safe_tier4.json", "semantic_primitives.json", "session_metadata.json", "synthesis.json", "thread_extractions.json"], "writes": [], "nodeType": "script", "doc": "Batch Orchestrator \u2014 Runs Phases 1-2 across all sessions automatically.\n\nThis script is meant to be run INSIDE a Claude Code session. It prints\ninstructions that Claude should follow \u2014 launching agents via the Task tool,\nchecking outputs, and moving to the next session.\n\nUsage:\n    python3 interactive_batch_runner.py --next       Show the next session to process\n    python3 interactive_batch_runner.py --status     Show overall progress\n    python3 interactive_batch_runner.py --queue      Show full queue with sizes"}, "phase_1_extraction_opus_phase1_py": {"label": "opus_phase1.py", "relPath": "phase_1_extraction/opus_phase1.py", "phase": "1", "cluster": "Primary", "reads": ["phase1_redo_progress.json", "safe_condensed.json", "safe_tier4.json", "session_metadata.json"], "writes": ["explorer_notes.json", "geological_notes.json", "phase1_redo_progress.json", "semantic_primitives.json", "thread_extractions.json"], "nodeType": "script", "doc": "Opus Phase 1 \u2014 Runs 4 sequential Opus agents on a session.\n\nUses the Anthropic API directly (one call at a time). For each session:\n  1. Thread Analyst pass \u2192 thread_extractions.json\n  2. Geological Reader pass \u2192 geological_notes.json\n  3. Primitives Tagger pass \u2192 semantic_primitives.json\n  4. Free Explorer VERIFICATION pass \u2192 explorer_notes.json\n     (reads all 3 prior outputs + raw data, verifies + discovers)\n\nThe Explorer runs LAST deliberately \u2014 it verifies Phase 0 data quality\nand the other 3 agents' outputs before adding its own discoveries.\n\nProgress is written to ~/PERMANENT_HYPERDOCS/indexes/phase1_redo_progress.json\nwhich the tracking HTML reads.\n\nUsage:\n    python3 opus_phase1.py                  # process all sessions\n    python3 opus_phase1.py --start-from 50  # resume from session 50\n    python3 opus_phase1.py --session session_0012ebed  # one session\n\nCHANGE LOG \u2014 Prompt & Config Fixes\n====================================\nRound 1 (Feb 11): Initial implementation\n  - 4 agent prompts (Thread Analyst, Geological Reader, Primitives Tagger, Explorer)\n  - MAX_TOKENS=16000, no thinking budget\n  - Explorer runs last with verification mandate\n\nRound 2 (Feb 11): Streaming + thinking\n  - MAX_TOKENS raised to 64000, THINKING_BUDGET=32000\n  - Switched from client.messages.create() to client.messages.stream()\n    because extended thinking requires streaming for long operations\n  - Added .env file loading for ANTHROPIC_API_KEY\n\nRound 3 (Feb 11): Primitives truncation fix + content-referential warning\n  - Primitives Tagger prompt: pre-filters to tier 2+ messages only (was sending\n    all 1317 messages including 1111 tier-1 skips). Result: 206 tagged (was 23).\n  - Added CRITICAL WARNING to Primitives Tagger prompt about content-referential\n    filter_signals. Explorer found 5 messages mistagged because the Tagger treated\n    failure/frustration keyword counts as emotional state indicators.\n    Source: Explorer verification Round 2 on session_0012ebed.\n\nRound 4 (Feb 11): Output + prompt fixes\n  - MAX_TOKENS raised to 128000 (was 64000) to prevent Primitives Tagger\n    output truncation on large sessions (206 messages need ~100K output).\n  - Thread Analyst prompt: added CRITICAL warning against fabricating\n    round-number indices (900, 1000). Must only reference indices from data.\n  - Session continuation detection added to Phase 0 (FIX 12).\n  - Content-referential detection further improved in Phase 0 (FIX 14).\n\nTest iterations on session_0012ebed:\n  Iter 1: significant_issues (6 P0, 4 thread, 4 geo, 4 prims issues)\n  Iter 2: significant_issues (4 P0, 3 thread, 2 geo, 5 prims) \u2014 206 tagged\n  Iter 3: significant_issues (4 P0, 3 thread, 3 geo, 3 prims) \u2014 169 tagged\n  Iter 4: significant_issues (3 P0 minor, 1 thread CRITICAL json fail, 3 geo minor, 3 prims moderate)\n\nRound 5 (Feb 11): JSON recovery + prompt hardening\n  - JSON parse fallback: 3-strategy recovery (outermost braces, trailing comma fix,\n    truncation repair by counting unmatched braces). Thread Analyst failed with\n    malformed JSON in iter 4 \u2014 the 7603-char cutoff suggests output truncation.\n  - MAX_TOKENS already at 128K, so the issue is likely the model stopping mid-JSON.\n  - Primitives Tagger prompt: added WRONG examples with corrections for content-ref\n    misclassification. \"IGNORE filter_signals entirely for emotional tagging.\"\n  - Geological Reader prompt: added RULES about only citing verifiable data,\n    using temporal gaps for phase boundaries, content-ref signal awareness.\n  - Thread Analyst prompt: already has fabrication warning from Round 4.\n\n  Iter 5: Running..."}, "phase_1_extraction_tag_semantic_primitives_py": {"label": "tag_semantic_primitives.py", "relPath": "phase_1_extraction/tag_semantic_primitives.py", "phase": "1", "cluster": "Fallback", "reads": ["enriched_session.json", "opus_priority_messages.json", "tier4_priority_messages.json", "user_messages_tier2plus.json"], "writes": ["semantic_primitives.json"], "nodeType": "script", "doc": "Semantic Primitives Tagger (standalone)\nTags tier 4 priority messages with the 7 Semantic Primitives.\n\nNOTE: This is the standalone/deterministic tagger. The Phase 1 batch pipeline\nuses the Opus-based tagger in redo_all_phase1.py instead. This file\nis kept for single-session processing and as a reference implementation.\n\nPrimitives:\n1. Action Vector: created|modified|debugged|refactored|discovered|decided|abandoned|reverted\n2. Confidence Signal: experimental|tentative|working|stable|proven|fragile\n3. Emotional Tenor: frustrated|uncertain|curious|cautious|confident|excited|relieved\n4. Intent Marker: correctness|performance|maintainability|feature|bugfix|exploration|cleanup\n5. Friction Log: Single compressed sentence or null\n6. Decision Trace: \"chose X over Y because Z\" or null\n7. Disclosure Pointer: content_hash from enriched data"}, "phase_2_synthesis_backfill_phase2_py": {"label": "backfill_phase2.py", "relPath": "phase_2_synthesis/backfill_phase2.py", "phase": "2", "cluster": "Synthesis", "reads": ["explorer_notes.json", "geological_notes.json", "grounded_markers.json", "idea_graph.json", "semantic_primitives.json", "session_metadata.json", "synthesis.json", "thread_extractions.json"], "writes": ["grounded_markers.json", "idea_graph.json", "synthesis.json"], "nodeType": "script", "doc": "Batch Phase 2 generator for sessions missing P2 files."}, "phase_2_synthesis_code_similarity_py": {"label": "code_similarity.py", "relPath": "phase_2_synthesis/code_similarity.py", "phase": "2", "cluster": "Synthesis", "reads": [], "writes": [], "nodeType": "script", "doc": "Code Similarity Engine \u2014 Import Shim\n=====================================\n\nThis module re-exports from the canonical implementation at\nphase_0_prep/code_similarity.py, which has structured logging.\n\nThe full-scan engine, FileFingerprint class, comparison functions,\nand pattern classification are all defined there. This shim exists\nso that existing imports like:\n\n    from phase_2_synthesis.code_similarity import FileFingerprint\n\ncontinue to work without maintaining a 500+ line duplicate."}, "phase_2_synthesis_file_genealogy_py": {"label": "file_genealogy.py", "relPath": "phase_2_synthesis/file_genealogy.py", "phase": "2", "cluster": "Synthesis", "reads": ["idea_graph.json", "thread_extractions.json"], "writes": ["file_genealogy.json"], "nodeType": "script", "doc": "File Genealogy Detector\n\nAI doesn't version files \u2014 it rewrites them under new names. This script\ndetects file identity across renames, rewrites, and duplications.\n\nUsers see 40 files and feel overwhelmed. This shows them: \"you actually\nhave 12 concepts, and here's the latest version of each.\"\n\nThree detection signals:\n1. Idea graph lineage \u2014 concept A (mentions file X) evolved into concept B (mentions file Y)\n2. Temporal succession \u2014 file X stops being modified, file Y starts at the same time\n3. Name similarity \u2014 files with overlapping stems (thread_extractor \u2192 six_thread_extractor)\n\nInput:  thread_extractions.json + idea_graph.json\nOutput: file_genealogy.json"}, "phase_3_hyperdoc_writing_collect_file_evidence_py": {"label": "collect_file_evidence.py", "relPath": "phase_3_hyperdoc_writing/collect_file_evidence.py", "phase": "3", "cluster": "Evidence Collection", "reads": ["claude_md_analysis.json", "explorer_notes.json", "file_dossiers.json", "file_genealogy.json", "geological_notes.json", "grounded_markers.json", "idea_graph.json", "semantic_primitives.json", "session_metadata.json", "synthesis.json", "thread_extractions.json"], "writes": ["file_evidence/*_evidence.json"], "nodeType": "script", "doc": "Phase 3a: Per-Session File Evidence Collector\n\nFor each file mentioned in a session, collects 11 types of evidence from all\n12 data sources using time-window correlation (\u00b110 messages around each mention).\n\nReads per session:\n  - session_metadata.json \u2014 file mention counts, top_files, session stats\n  - geological_notes.json \u2014 micro/meso/macro observations\n  - semantic_primitives.json \u2014 tagged messages, all 4 distributions\n  - explorer_notes.json \u2014 observations, verification, data quality\n  - file_genealogy.json \u2014 file families\n  - thread_extractions.json \u2014 6 thread categories + per-message markers\n  - grounded_markers.json \u2014 markers referencing files (marker/context/confidence/source)\n  - idea_graph.json \u2014 nodes, edges, subgraphs, statistics\n  - synthesis.json \u2014 6-pass multi-temperature analysis + passes.summary\n  - claude_md_analysis.json \u2014 gate analysis, findings, recommendations, tier2 security\n  - file_dossiers.json \u2014 per-file dossiers with summary, analysis_sources, canonical_path\n\nWrites per file:\n  output/session_XXXX/file_evidence/{safe_filename}_evidence.json\n\nEach evidence JSON has 11 sections:\n  1. emotional_arc \u2014 primitives from the time window + all 4 distributions\n  2. geological_character \u2014 geological observations by name + time overlap\n  3. lineage \u2014 genealogy links from file_genealogy + idea_graph + dossier extras\n  4. explorer_observations \u2014 explorer notes + overall_data_quality\n  5. chronological_timeline \u2014 thread entries + grounded markers (full schema)\n  6. code_similarity \u2014 placeholder (populated by Phase 4a aggregation)\n  7. graph_context \u2014 connected edges, subgraphs, graph statistics (session-level)\n  8. synthesis_context \u2014 multi-pass analysis passes 1-6 + summary (session-level)\n  9. claude_md_context \u2014 file analyses, findings, recommendations, tier2 (session-level)\n  10. session_context \u2014 message counts, tokens, tier distribution, frustration peaks\n  11. thread_markers \u2014 pivot/failure/breakthrough/deception markers per message\n\n$0 cost \u2014 pure Python, no LLM calls.\n\nUsage:\n    python3 phase_3_hyperdoc_writing/collect_file_evidence.py --session 513d4807\n    HYPERDOCS_SESSION_ID=513d4807 python3 phase_3_hyperdoc_writing/collect_file_evidence.py"}, "phase_3_hyperdoc_writing_evidence_resolver_py": {"label": "evidence_resolver.py", "relPath": "phase_3_hyperdoc_writing/evidence_resolver.py", "phase": "3", "cluster": "Evidence Collection", "reads": [], "writes": [], "nodeType": "script", "doc": "Evidence Resolver \u2014 parses @evidence directives and replaces them with rendered blocks.\n\nThe resolver is called after the Phase 3 narrator (LLM) produces text. It finds all\n@evidence:type(params) directives, routes each to the appropriate renderer, and replaces\nthe directive with the rendered output.\n\nUsage:\n    from evidence_resolver import resolve\n    final_text = resolve(narrator_output, session_dir)\n\nDirective syntax:\n    @evidence:debug_sequence(range=[523,531])\n    @evidence:emotional_arc(range=[520,540])\n    @evidence:idea_transition(chain=[N01,N02,N03])\n    @evidence:idea_transition(node=N16)\n    @evidence:reaction_log(range=[0,1317])\n    @evidence:file_timeline(file=\"config.py\")\n    @evidence:geological_event(msg=523)\n    @evidence:decision_trace(marker=\"GM-001\")\n    @evidence:decision_trace(chain=[N01,N02])"}, "phase_3_hyperdoc_writing_evidence_base_py": {"label": "base.py", "relPath": "phase_3_hyperdoc_writing/evidence/base.py", "phase": "3", "cluster": "Evidence Collection", "reads": ["enriched_session.json", "file_dossiers.json", "geological_notes.json", "grounded_markers.json", "idea_graph.json", "semantic_primitives.json", "thread_extractions.json"], "writes": [], "nodeType": "script", "doc": "Base evidence renderer class.\n\nAll 7 evidence renderers inherit from EvidenceRenderer, which provides\nshared data loading from session output directories using the same\nPERM-first search strategy as collect_file_evidence.py."}, "phase_3_hyperdoc_writing_generate_dossiers_py": {"label": "generate_dossiers.py", "relPath": "phase_3_hyperdoc_writing/generate_dossiers.py", "phase": "3", "cluster": "Output", "reads": ["grounded_markers.json", "idea_graph.json", "session_metadata.json", "thread_extractions.json"], "writes": ["claude_md_analysis.json", "file_dossiers.json"], "nodeType": "script", "doc": "Agent 7: File Mapper\nGenerates file_dossiers.json and claude_md_analysis.json from session data.\n\nReads:\n  - session_metadata.json (file mention counts, top files, frustration peaks)\n  - grounded_markers.json (warnings W01-W12, recommendations R01-R12, patterns B01-B08, iron rules)\n  - thread_extractions.json (per-message software thread file references)\n  - idea_graph.json (subgraphs mapping ideas to file-related concepts)\n\nWrites:\n  - file_dossiers.json (top 15 files with full behavioral/structural profiles)\n  - claude_md_analysis.json (how CLAUDE.md gates affected this session)"}, "phase_3_hyperdoc_writing_generate_viewer_py": {"label": "generate_viewer.py", "relPath": "phase_3_hyperdoc_writing/generate_viewer.py", "phase": "3", "cluster": "Output", "reads": ["claude_md_analysis.json", "explorer_notes.json", "file_dossiers.json", "geological_notes.json", "grounded_markers.json", "hyperdoc_blocks/*.txt", "idea_graph.json", "semantic_primitives.json", "session_metadata.json", "synthesis.json", "thread_extractions.json"], "writes": ["pipeline_viewer.html"], "nodeType": "script", "doc": "Generate a comprehensive HTML viewer for all pipeline outputs."}, "phase_3_hyperdoc_writing_write_hyperdocs_py": {"label": "write_hyperdocs.py", "relPath": "phase_3_hyperdoc_writing/write_hyperdocs.py", "phase": "3", "cluster": "Output", "reads": ["claude_md_analysis.json", "file_dossiers.json", "grounded_markers.json", "hyperdoc_blocks/*_hyperdoc.txt", "idea_graph.json"], "writes": ["hyperdoc_blocks/*_hyperdoc.txt"], "nodeType": "script", "doc": "Agent 8: Hyperdoc Writer\nReads file_dossiers.json and grounded_markers.json to compose hyperdoc comment\nblocks for the top 5 files. Writes each block to hyperdoc_blocks/{filename}_hyperdoc.txt.\n\nNo metaphors. No poetry. Maximum precision. Zero creativity."}, "phase_3_hyperdoc_writing_write_more_hyperdocs_py": {"label": "write_more_hyperdocs.py", "relPath": "phase_3_hyperdoc_writing/write_more_hyperdocs.py", "phase": "3", "cluster": "Output", "reads": ["file_dossiers.json", "grounded_markers.json"], "writes": ["hyperdoc_blocks/*_hyperdoc.txt"], "nodeType": "script", "doc": "Generate hyperdoc blocks for the remaining 10 files (we already have 5).\nUses file_dossiers.json + grounded_markers.json to compose blocks."}, "phase_4a_aggregation_aggregate_dossiers_py": {"label": "aggregate_dossiers.py", "relPath": "phase_4a_aggregation/aggregate_dossiers.py", "phase": "4a", "cluster": "Aggregation", "reads": ["code_similarity_index.json", "enriched_session.json", "enriched_session_v2.json", "file_dossiers.json", "file_evidence/*_evidence.json", "file_genealogy.json", "session_metadata.json"], "writes": ["cross_session_file_index.json", "hyperdoc_inputs/*.json"], "nodeType": "script", "doc": "Phase 4a: Cross-Session Dossier Aggregation\n\nReads all 261 session file_dossiers.json files, normalizes the two\nincompatible schemas (dict-keyed vs list-based), and aggregates per-file\nacross all sessions.\n\nOutput: output/cross_session_file_index.json\n\n$0 cost \u2014 pure Python, no LLM calls."}, "phase_4_insertion_hyperdoc_layers_py": {"label": "hyperdoc_layers.py", "relPath": "phase_4_insertion/hyperdoc_layers.py", "phase": "4b", "cluster": "Insertion", "reads": ["*_hyperdoc.json"], "writes": ["*_hyperdoc.json"], "nodeType": "script", "doc": "Hyperdoc Layer Manager\n======================\n\nHyperdocs grow. They never shrink. Each pipeline run appends a layer.\n\nLayer types:\n  - historical:  From batch processing (the original 456 hyperdocs)\n  - realtime:    From incremental/continuous processing\n  - seed:        Created when a new file is born (before code is written)\n  - verification: Ground truth check results\n\nThe cumulative_summary aggregates across all layers.\n\nUsage:\n    # Migrate existing hyperdoc to layered format:\n    python3 hyperdoc_layers.py --migrate ~/PERMANENT_HYPERDOCS/hyperdocs/\n\n    # Add a layer to an existing hyperdoc:\n    from phase_4_insertion.hyperdoc_layers import HyperdocLayerManager\n    mgr = HyperdocLayerManager()\n    mgr.append_layer(\"gate_control.py\", layer_data)\n\n    # Generate a seed hyperdoc for a new file:\n    mgr.create_seed(\"new_file.py\", context=\"Created for user auth\", related=[\"auth.py\"])"}, "phase_4_insertion_insert_from_phase4b_py": {"label": "insert_from_phase4b.py", "relPath": "phase_4_insertion/insert_from_phase4b.py", "phase": "4b", "cluster": "Insertion", "reads": ["hyperdocs/*_hyperdoc.json"], "writes": ["enhanced_files_archive/*.html", "enhanced_files_archive/*.js", "enhanced_files_archive/*.json.hyperdoc.md", "enhanced_files_archive/*.md", "enhanced_files_archive/*.toml"], "nodeType": "script", "doc": "Phase 4b: Insert hyperdocs from Phase 4b JSON into source code files.\n\nReads from: output/hyperdocs/*_hyperdoc.json\nWrites to:  output/enhanced_files/{filename}  (COPIES \u2014 originals untouched)\n\nEach hyperdoc JSON has:\n  - header: multiline string \u2192 inserted after imports, before first class/function\n  - inline_annotations: [{target, target_type, comment_lines}, ...] \u2192 inserted before each target\n  - footer: multiline string \u2192 appended at end of file\n\nOnly processes files that exist on disk. Skips deleted/archived/ghost files."}, "phase_4_insertion_insert_hyperdocs_v2_py": {"label": "insert_hyperdocs_v2.py", "relPath": "phase_4_insertion/insert_hyperdocs_v2.py", "phase": "4b", "cluster": "Insertion", "reads": ["hyperdoc_v2/*_footer.txt", "hyperdoc_v2/*_header.txt", "hyperdoc_v2/*_inline.json"], "writes": [], "nodeType": "script", "doc": "Smart Hyperdoc Insertion (V2) \u2014 Header + Inline + Footer\n\nPlaces hyperdoc content at three locations in each code file:\n1. HEADER: After imports, before first class/function (file-level context)\n2. INLINE: Before specific functions/classes that have per-function data\n3. FOOTER: At end of file (version history, metrics, idea graph subgraphs)\n\nReads from: {session_output_dir}/hyperdoc_v2/{filename}_header.txt\n                                              {filename}_inline.json\n                                              {filename}_footer.txt\n\nWrites to:  {session_output_dir}/hyperdoc_previews_v2/{filename}"}, "phase_4_insertion_insert_hyperdocs_py": {"label": "insert_hyperdocs.py", "relPath": "phase_4_insertion/insert_hyperdocs.py", "phase": "4b", "cluster": "Insertion", "reads": ["hyperdoc_blocks/*_hyperdoc.txt"], "writes": [], "nodeType": "script", "doc": "Insert hyperdoc blocks into copies of the original code files.\n\nPlaces the hyperdoc comment block after imports and module-level code,\nbefore the first class or function definition. This is the canonical\nposition: the first thing a future Claude reads after understanding\nwhat the file imports."}, "config_py": {"label": "config.py", "relPath": "config.py", "phase": "tools", "cluster": "Utilities", "reads": ["projects/*/**.jsonl"], "writes": [], "nodeType": "script", "doc": "Hyperdocs Configuration \u2014 Central settings for all phases.\n\nAll scripts import from here. Override with environment variables:\n    HYPERDOCS_SESSION_ID     \u2014 Session UUID to process\n    HYPERDOCS_CHAT_HISTORY   \u2014 Path to JSONL file\n    HYPERDOCS_OUTPUT_DIR     \u2014 Where pipeline writes outputs\n    HYPERDOCS_ARCHIVE_PATH   \u2014 Path to PERMANENT_ARCHIVE (optional)\n    HYPERDOCS_PROJECT_ID     \u2014 Claude Code project identifier (optional)\n    ANTHROPIC_API_KEY        \u2014 Required for phases 1-3"}, "tools_json_io_py": {"label": "json_io.py", "relPath": "tools/json_io.py", "phase": "tools", "cluster": "Utilities", "reads": [], "writes": [], "nodeType": "script", "doc": "Shared JSON I/O for the Hyperdocs pipeline.\n\nHARD FAIL contract:\n  load_json(path)  \u2014 raises FileNotFoundError if missing, json.JSONDecodeError if corrupt.\n  save_json(path, data) \u2014 raises on any write failure. Creates parent dirs.\n\nCallers who need optional files must check path.exists() first, then call load_json().\nNo silent fallbacks. No empty-dict returns. Corrupt data is a crash, not a default."}, "tools_log_config_py": {"label": "log_config.py", "relPath": "tools/log_config.py", "phase": "tools", "cluster": "Utilities", "reads": [], "writes": [], "nodeType": "script", "doc": "Shared logging setup for the Hyperdocs pipeline.\n\nUsage in any module:\n    from tools.log_config import get_logger\n    logger = get_logger(\"phase0.enrich_session\")\n    logger.info(\"Processing session...\")\n\nMain entry points call setup_pipeline_logging() once to configure handlers:\n    from tools.log_config import setup_pipeline_logging\n    setup_pipeline_logging(session_id=\"abc12345\", log_dir=Path(\"output/session_abc12345\"))\n\nNamespace convention:\n    hyperdocs.phase0.enrich_session\n    hyperdocs.phase1.extract_threads\n    hyperdocs.tools.run_pipeline\n    hyperdocs.product.dashboard"}, "tools_file_lock_py": {"label": "file_lock.py", "relPath": "tools/file_lock.py", "phase": "tools", "cluster": "Utilities", "reads": [], "writes": [], "nodeType": "script", "doc": "Atomic file writing with advisory locking for shared pipeline state files.\n\nUsage:\n    from tools.file_lock import atomic_json_write, locked_json_read\n\n    # Write with lock (prevents concurrent corruption):\n    atomic_json_write(path, data)\n\n    # Read with lock (consistent reads during writes):\n    data = locked_json_read(path)"}, "tools_run_pipeline_py": {"label": "run_pipeline.py", "relPath": "tools/run_pipeline.py", "phase": "tools", "cluster": "Orchestrators", "reads": ["claude_md_analysis.json", "enriched_session.json", "explorer_notes.json", "file_dossiers.json", "geological_notes.json", "grounded_markers.json", "idea_graph.json", "opus_classifications.json", "semantic_primitives.json", "session_metadata.json", "synthesis.json", "thread_extractions.json"], "writes": ["grounded_markers.json", "idea_graph.json", "synthesis.json"], "nodeType": "script", "doc": "End-to-end pipeline runner for Hyperdocs.\n\nRuns a session through ALL phases in order. No fallbacks. Every step must succeed.\n\n  Phase 0a: enrich_session.py \u2192 enriched_session.json\n  Phase 0b: llm_pass_runner.py (4 passes) \u2192 llm_pass{1-4}_*.json\n  Phase 0c: merge_llm_results.py \u2192 enriched_session_v2.json\n  Phase 0d: opus_classifier.py \u2192 opus_classifications.json\n  Phase 0e: build_opus_messages.py \u2192 opus_priority_messages.json\n  Phase 0f: prepare_agent_data.py \u2192 9 agent-readable files\n  Phase 0g: schema_normalizer.py \u2192 normalize schemas\n  Phase 1:  opus_phase1.py \u2192 thread_extractions, geological_notes, semantic_primitives, explorer_notes\n  Phase 2:  backfill_phase2.py \u2192 idea_graph, synthesis, grounded_markers\n  Phase 2b: file_genealogy.py \u2192 file_genealogy.json\n  Phase 3a: collect_file_evidence.py \u2192 file_evidence/*.json\n  Phase 3b: generate_dossiers.py \u2192 file_dossiers.json, claude_md_analysis.json\n  Phase 3c: generate_viewer.py \u2192 pipeline_viewer.html\n  Phase 4a: aggregate_dossiers.py \u2192 cross_session_file_index.json\n  Phase 4b: insert_hyperdocs_v2.py \u2192 enhanced source files\n  Phase 4c: hyperdoc_layers.py \u2192 layered hyperdoc JSON\n\nUsage:\n    python3 tools/run_pipeline.py SESSION_ID              # Full pipeline\n    python3 tools/run_pipeline.py SESSION_ID --phase 0    # Just Phase 0\n    python3 tools/run_pipeline.py SESSION_ID --force      # Re-run even if complete\n    python3 tools/run_pipeline.py --batch 100             # 100 most recent sessions"}, "tools_pipeline_status_py": {"label": "pipeline_status.py", "relPath": "tools/pipeline_status.py", "phase": "tools", "cluster": "Scanners", "reads": ["batch_runner_checkpoint.json"], "writes": [], "nodeType": "script", "doc": "Pipeline observability \u2014 aggregate status across all sessions and runs.\n\nReads pipeline_run.log files, checkpoint files, and session directories to\nproduce a comprehensive status report.\n\nUsage:\n    python3 tools/pipeline_status.py              # Full status report\n    python3 tools/pipeline_status.py --errors      # Only errors\n    python3 tools/pipeline_status.py --json        # Machine-readable output"}, "tools_batch_runner_py": {"label": "batch_runner.py", "relPath": "tools/batch_runner.py", "phase": "tools", "cluster": "Orchestrators", "reads": ["batch_runner_checkpoint.json"], "writes": ["batch_runner_checkpoint.json"], "nodeType": "script", "doc": "Batch pipeline runner with checkpoint-based retry/resume.\n\nProcesses multiple sessions through the pipeline, tracking progress in a\ncheckpoint file. If interrupted, re-running picks up from where it stopped.\n\nUsage:\n    python3 tools/batch_runner.py                          # All sessions, free phases\n    python3 tools/batch_runner.py --full                   # All sessions, all phases\n    python3 tools/batch_runner.py --phase 2                # All sessions, Phase 2 only\n    python3 tools/batch_runner.py --resume                 # Resume from last checkpoint\n    python3 tools/batch_runner.py --sessions s1 s2 s3      # Specific sessions"}, "tools_batch_phase3a_py": {"label": "batch_phase3a.py", "relPath": "tools/batch_phase3a.py", "phase": "tools", "cluster": "Orchestrators", "reads": ["file_evidence/*_evidence.json", "grounded_markers.json", "idea_graph.json", "session_metadata.json", "thread_extractions.json"], "writes": [], "nodeType": "script", "doc": "Batch runner for Phase 3a (collect_file_evidence.py) across multiple sessions.\n\nFinds sessions that have Phase 2 complete but no file_evidence/ directory,\nand runs collect_file_evidence.py on each. Pure Python, $0.\n\nUsage:\n    python3 tools/batch_phase3a.py --count 50\n    python3 tools/batch_phase3a.py --count 50 --dry-run"}, "tools_schema_contracts_py": {"label": "schema_contracts.py", "relPath": "tools/schema_contracts.py", "phase": "tools", "cluster": "Validators", "reads": ["claude_md_analysis.json", "enriched_session.json", "explorer_notes.json", "file_dossiers.json", "geological_notes.json", "grounded_markers.json", "idea_graph.json", "semantic_primitives.json", "session_metadata.json", "synthesis.json", "thread_extractions.json"], "writes": [], "nodeType": "script", "doc": "Formal schema contracts for all pipeline output files.\n\nEach phase's output must conform to these contracts. The validate_session()\nfunction checks all files in a session directory against these contracts.\n\nUsage:\n    # Validate a session:\n    python3 tools/schema_contracts.py session_513d4807\n\n    # Validate all sessions:\n    python3 tools/schema_contracts.py --all\n\n    # As a library:\n    from tools.schema_contracts import validate_session\n    errors = validate_session(\"/path/to/session_dir\")"}, "tools_extract_dashboard_data_py": {"label": "extract_dashboard_data.py", "relPath": "tools/extract_dashboard_data.py", "phase": "tools", "cluster": "Generators", "reads": ["claude_md_analysis.json", "enriched_session.json", "explorer_notes.json", "file_dossiers.json", "geological_notes.json", "grounded_markers.json", "hyperdocs/*_hyperdoc.json", "idea_graph.json", "semantic_primitives.json", "session_metadata.json", "synthesis.json", "thread_extractions.json"], "writes": ["dashboard_data.json"], "nodeType": "script", "doc": "Extract all visualization data from the Hyperdocs pipeline output.\nProduces dashboard_data.json with rich data for the interactive dashboard."}, "tools_hyperdoc_comparison_py": {"label": "hyperdoc_comparison.py", "relPath": "tools/hyperdoc_comparison.py", "phase": "tools", "cluster": "Generators", "reads": [], "writes": ["comparison_*.html", "comparison_*.json"], "nodeType": "script", "doc": "Hyperdoc Comparison \u2014 Side-by-side demo of Opus with vs without hyperdocs.\n\nSends the same file to Opus twice with a deliberately vague prompt:\n  \"Here's my file. What should I do next?\"\n\nVersion A: bare code (markers stripped)\nVersion B: code + hyperdoc markers\n\nOutputs an HTML visual showing both responses side by side.\n\nUsage:\n    python3 hyperdoc_comparison.py phase_0_prep/enrich_session.py\n    python3 hyperdoc_comparison.py --all   # Run on all 5 enhanced files\n\nRequires: ANTHROPIC_API_KEY environment variable"}, "tools_generate_pipeline_excel_py": {"label": "generate_pipeline_excel.py", "relPath": "tools/generate_pipeline_excel.py", "phase": "tools", "cluster": "Generators", "reads": ["claude_md_analysis.json", "cross_session_file_index.json", "enriched_session.json", "explorer_notes.json", "file_dossiers.json", "file_evidence/*_evidence.json", "geological_notes.json", "grounded_markers.json", "idea_graph.json", "safe_condensed.json", "safe_tier4.json", "semantic_primitives.json", "session_metadata.json", "synthesis.json", "thread_extractions.json", "tier4_priority_messages.json"], "writes": ["pipeline_complete_anatomy.xlsx"], "nodeType": "script", "doc": "Generate an exhaustive Excel workbook documenting every detail of the Hyperdocs pipeline.\n\nReads actual session data and catalogs:\n  - Every file in every session, with sizes and field counts\n  - Every field in every JSON file, with types, depths, and sample values\n  - The complete processing chain: what creates each file, what reads it\n  - Per-session statistics across all 50+ processed sessions\n  - The cross-session index field-by-field breakdown\n\nOutput: pipeline_complete_anatomy.xlsx"}, "tools_add_data_trace_sheets_py": {"label": "add_data_trace_sheets.py", "relPath": "tools/add_data_trace_sheets.py", "phase": "tools", "cluster": "Generators", "reads": ["cross_session_file_index.json", "enriched_session.json", "file_dossiers.json", "file_evidence/*_evidence.json", "geological_notes.json", "grounded_markers.json", "idea_graph.json", "pipeline_complete_anatomy.xlsx", "semantic_primitives.json", "synthesis.json", "thread_extractions.json"], "writes": ["pipeline_complete_anatomy.xlsx"], "nodeType": "script", "doc": "Add data-trace sheets to the pipeline Excel workbook.\n\nShows ACTUAL DATA flowing through each transformation stage:\n  Sheet 6: Message Trace \u2014 3 real messages traced through every pipeline stage\n  Sheet 7: LLM Agent Outputs \u2014 What each Opus agent actually produces\n  Sheet 8: Evidence Collection Output \u2014 What collect_file_evidence.py produces for one file\n  Sheet 9: Cross-Session Aggregation \u2014 How one file accumulates data across sessions\n  Sheet 10: Transformation Detail \u2014 Before/after for every major operation"}, "tools_analyze_data_flow_py": {"label": "analyze_data_flow.py", "relPath": "tools/analyze_data_flow.py", "phase": "tools", "cluster": "Generators", "reads": [], "writes": ["positioning_analysis.json"], "nodeType": "script", "doc": "Positioning Analyzer \u2014 Data Flow Graph + Dead-End Detection + Phase Positioning\n================================================================================\n\nAnalyzes the hyperdocs_3 pipeline code to determine:\n\nA. DATA FLOW GRAPH: Which scripts produce which JSON files, which scripts consume\n   them, and which outputs are dead ends (nothing reads them).\n\nB. EARLIEST-POSSIBLE-PHASE: For each script, determines the earliest phase it\n   could run based on what phase its input files come from. Compares to where\n   it actually lives in the directory structure.\n\nPure Python. No API calls. No LLM. Standalone.\n\nOutput: positioning_analysis.json (same directory as this script)\n        + human-readable summary to stdout\n\nUsage:\n    python3 analyze_data_flow.py"}, "tools_data_lifecycle_py": {"label": "data_lifecycle.py", "relPath": "tools/data_lifecycle.py", "phase": "tools", "cluster": "Scanners", "reads": [], "writes": [], "nodeType": "script", "doc": "Data lifecycle manager \u2014 identify stale, orphan, and oversized data.\n\nReports what can be cleaned up. Does NOT auto-delete \u2014 reports only.\n\nUsage:\n    python3 tools/data_lifecycle.py                # Full scan\n    python3 tools/data_lifecycle.py --backups      # Show backup dirs\n    python3 tools/data_lifecycle.py --orphans      # Show orphan files"}, "tools_verify_data_locations_py": {"label": "verify_data_locations.py", "relPath": "tools/verify_data_locations.py", "phase": "tools", "cluster": "Scanners", "reads": [], "writes": [], "nodeType": "script", "doc": "Verify data consistency between output/ and ~/PERMANENT_HYPERDOCS/sessions/.\n\nBoth locations should contain the same session directories with the same file counts.\nDifferences indicate sync issues (the hourly cron may have missed sessions).\n\nUsage:\n    python3 verify_data_locations.py"}, "tools_pipeline_health_check_py": {"label": "pipeline_health_check.py", "relPath": "tools/pipeline_health_check.py", "phase": "tools", "cluster": "Scanners", "reads": ["claude_md_analysis.json", "enriched_session.json", "explorer_notes.json", "file_dossiers.json", "geological_notes.json", "grounded_markers.json", "hyperdocs/*_hyperdoc.json", "idea_graph.json", "semantic_primitives.json", "session_metadata.json", "synthesis.json", "thread_extractions.json"], "writes": ["health_check_report.json"], "nodeType": "script", "doc": "Pipeline Health Check \u2014 All 10 test types for the Hyperdocs pipeline.\n\nRuns every verification needed to confirm the pipeline is perfect:\n  1. Schema Compatibility \u2014 output keys match consumer expectations\n  2. End-to-End Run \u2014 full pipeline produces output at every stage\n  3. Data Volume \u2014 no data loss between stages\n  4. Empty Input Handling \u2014 graceful behavior on edge cases\n  5. Idempotency \u2014 running twice produces same result\n  6. Import Verification \u2014 every module imports without errors\n  7. Path Resolution \u2014 all file references resolve to real files\n  8. Backward Compatibility \u2014 old sessions still readable\n  9. Cross- let svgEl,tx=0,ty=0,sc=1,pan=false,px=0,py=0;

// ── Animation State ─────────────────────────────────────────
let anim={playing:false, step:-1, timer:null, mode:'trail', trail:new Set()};
