<title>Hyperdocs Pipeline Schematic</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f8f9fa;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif}
header{background:#1a1a2e;color:#fff;padding:12px 24px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.15)}
header h1{font-size:18px;font-weight:700;letter-spacing:-.3px}
header .sub{color:#8888aa;font-size:11px;margin-top:2px}
header .right{display:flex;align-items:center;gap:12px}
header .updated{color:#6c6c8a;font-size:11px}
.btn{background:#7c3aed;color:#fff;border:none;padding:8px 16px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;transition:background .15s}
.btn:hover{background:#6d28d9}
.btn:disabled{background:#555;cursor:not-allowed}
.btn-sm{padding:6px 12px;font-size:11px}
.btn-save{background:#2e7d32}.btn-save:hover{background:#1b5e20}
.diagram-container{overflow:auto;padding:16px;background:#fff;margin:0}

/* Update Panel */
.panel-overlay{display:none;position:fixed;top:0;right:0;bottom:0;left:0;z-index:200}
.panel-overlay.open{display:flex;justify-content:flex-end}
.panel-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.3)}
.panel{position:relative;width:460px;max-width:90vw;background:#fff;box-shadow:-4px 0 24px rgba(0,0,0,.15);display:flex;flex-direction:column;overflow:hidden;z-index:1}
.panel-head{padding:16px 20px;border-bottom:1px solid #e5e7eb;display:flex;justify-content:space-between;align-items:center}
.panel-head h2{font-size:15px;font-weight:700;color:#1a1a2e}
.panel-close{background:none;border:none;font-size:22px;cursor:pointer;color:#666;line-height:1}
.panel-close:hover{color:#000}
.panel-body{flex:1;overflow-y:auto;padding:16px 20px}
.panel-body label{display:block;font-size:12px;font-weight:600;color:#333;margin:14px 0 4px}
.panel-body label:first-child{margin-top:0}
.panel-body input,.panel-body textarea{width:100%;border:1px solid #d1d5db;border-radius:6px;padding:8px 10px;font-size:12px;font-family:inherit}
.panel-body textarea{resize:vertical;font-family:'SF Mono',Menlo,monospace;font-size:11px;line-height:1.5}
.panel-body small{display:block;color:#888;font-size:10px;margin-top:2px}
.panel-actions{padding:12px 20px;border-top:1px solid #e5e7eb;display:flex;gap:8px;flex-wrap:wrap}
</style>
</head>

const PIPELINE_MANIFEST = `HYPERDOCS PIPELINE — AUTO-SCANNED STATE (Feb 25, 2026 05:34 AM UTC)
Code hash: 62a85b6c74219282

  phase_0_prep/enrich_session.py
    Docstring: Phase 0: Deterministic Prep
  phase_0_prep/prepare_agent_data.py

  phase_4a_aggregation/aggregate_dossiers.py

  phase_4_insertion/insert_hyperdocs_v2.py

  phase_4_insertion/hyperdoc_layers.py

// ── One-click update ───────────────────────────────────────────
function saveKeyAndUpdate() {
  const key = document.getElementById('api-key').value.trim();
  if (!key) return;
  localStorage.setItem('hyperdocs_api_key', key);
  document.getElementById('key-prompt').classList.remove('open');
  runUpdate();
}

const API_KEY = localStorage.getItem('hyperdocs_api_key') || '';

async function handleUpdate() {
  await runUpdate();
}

async function runUpdate() {
  const apiKey = API_KEY;
  const currentSvg = document.getElementById('pipeline-svg').outerHTML;
  const btn = document.querySelector('header .btn');

  btn.disabled = true;
  btn.textContent = 'Updating...';

  const prompt = `You are regenerating an SVG pipeline schematic to match the current system state.

CURRENT SVG:
${currentSvg}

PIPELINE MANIFEST (source of truth — the SVG must accurately reflect this):
${PIPELINE_MANIFEST}

TASK: Compare the SVG against the manifest. Regenerate the SVG so every script, data file, and data flow arrow in the manifest is accurately represented. If the SVG already matches, return it unchanged. If there are discrepancies, fix them.

RULES:
1. Return ONLY the complete <svg id="pipeline-svg" ...>...</svg> element. No other text, no markdown, no explanation.
2. Visual style: sharp-corner rect for Python scripts, rounded rx=10 rect for JSON data files, dashed borders for optional/external items.
3. Color scheme: Phase 0 = #e0f7fa (cyan), Phase 1 = #ede7f6 (purple), Phase 2 = #e8f5e9 (green), Phase 3 = #fff8e1 (amber), Phase 4a/4b = #fce4ec (pink). Script borders match phase color. Data boxes #f5f5f5/#bbb.
4. Use marker id="ah" for arrowheads (define in defs).
5. Clean readable layout. Phase separation with labeled background boxes.
6. Update the footer date/time to now.
7. viewBox height must accommodate all content.
8. Preserve id="pipeline-svg" on the root svg element.
9. Include the full <defs> section with the arrowhead marker.

Generate the complete updated SVG now.`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-opus-4-6',
        max_tokens: 32000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      throw new Error(err.error?.message || `API error: ${response.status}`);
    }

    const data = await response.json();
    const text = data.content?.[0]?.text || '';

    const svgMatch = text.match(/<svg[\s\S]*<\/svg>/);
    if (!svgMatch) {
      alert('Update failed: Opus did not return valid SVG. Try again.');
      return;
    }

    // Replace SVG in DOM
    document.querySelector('.diagram-container').innerHTML = svgMatch[0];

    // Update header timestamp
    const now = new Date();
    const dateStr = now.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
    const timeStr = now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
    document.getElementById('last-updated').textContent = 'Updated: ' + dateStr + ' ' + timeStr;

    // Auto-save: trigger download of updated HTML
    saveHtml();

  } catch (err) {
    alert('Update failed: ' + err.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Update Schematic';
  }
}

function saveHtml() {
  const html = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
  const blob = new Blob([html], { type: 'text/html' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'hyperdocs-pipeline-schematic.html';
  a.click();
  URL.revokeObjectURL(url);
}
